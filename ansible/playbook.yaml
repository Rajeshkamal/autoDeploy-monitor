---
- name: Configure server and deploy AutoDeploy Monitor
  hosts: app_servers
  become: true
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Git
      apt:
        name: git
        state: present

    - name: Clone AutoDeploy Monitor repo
      git:
        repo: https://github.com/Rajeshkamal/autoDeploy-monitor.git
        dest: /home/ubuntu/autoDeploy-monitor
        force: yes

    - name: Build Docker image
      command: docker build -t autodeploy-monitor:v1 /home/ubuntu/autoDeploy-monitor

    - name: Run Docker container
      command: docker run -d -p 5000:5000 --name myapp --restart always autodeploy-monitor:v1
      ignore_errors: yes
